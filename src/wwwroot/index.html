<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --code-bg: #f4f4f4;
    --border: #e0e0e0;
    --quote: #666;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --text: #d4d4d4;
      --code-bg: #2d2d2d;
      --border: #444;
      --quote: #999;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding: 20px 48px;
    max-width: 920px;
    margin: 0 auto;
    line-height: 1.7;
    color: var(--text);
    background: var(--bg);
  }
  pre {
    background: var(--code-bg);
    padding: 16px 20px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.9em;
    line-height: 1.5;
  }
  code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
  }
  pre code {
    background: none;
    padding: 0;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
  }
  th {
    background: var(--code-bg);
    font-weight: 600;
  }
  blockquote {
    border-left: 4px solid #4a9eff;
    margin: 12px 0;
    padding: 4px 20px;
    color: var(--quote);
  }
  img {
    max-width: 100%;
    border-radius: 4px;
  }
  h1, h2, h3, h4, h5, h6 {
    margin-top: 24px;
    margin-bottom: 12px;
    font-weight: 600;
    line-height: 1.3;
  }
  h1 { font-size: 2em; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  a { color: #4a9eff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  ul, ol { padding-left: 24px; }

  .search-highlight {
    background-color: #FFEB3B;
    color: #000;
    border-radius: 2px;
    padding: 0 1px;
  }
  .search-highlight-current {
    background-color: #FF9800;
    color: #000;
    border-radius: 2px;
    padding: 0 1px;
  }


</style>
</head>
<body>

<div id="content">
  <p><em>Open a markdown file to see the preview.</em></p>
</div>

<script src="marked.min.js"></script>
<script>
  // --- Markdown Rendering ---
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      breaks: true,
      gfm: true
    });
  }

  // Tracks source positions for each rendered element so we can extract
  // raw markdown corresponding to a DOM selection.
  var _sourceRanges = [];   // [{el: DOM element, start: number, end: number}]

  function renderMarkdown(md, baseUrl) {
    // Reset source range tracking
    _sourceRanges = [];
    rawMarkdown = md;

    var html;
    if (typeof marked !== 'undefined') {
      // Tokenize to get source positions, then render with position
      // annotations so each block-level element knows its origin.
      var tokens = marked.lexer(md);
      var pos = 0;
      for (var i = 0; i < tokens.length; i++) {
        tokens[i]._mdStart = pos;
        if (typeof tokens[i].raw === 'string') {
          pos += tokens[i].raw.length;
        }
        tokens[i]._mdEnd = pos;
      }
      html = marked.parser(tokens);
    } else {
      html = '<pre>' + escapeHtml(md) + '</pre>';
    }

    var content = document.getElementById('content');
    content.innerHTML = html;

    // Walk block-level children and assign source-range data attributes.
    // We re-tokenize to find corresponding spans in the raw markdown
    // for each rendered DOM block.
    _annotateSourceRanges(content, tokens, md);

    if (baseUrl) {
      content.querySelectorAll('img').forEach(function(img) {
        var src = img.getAttribute('src');
        if (src && !/^(https?:|file:|data:)/i.test(src)) {
          try { img.src = new URL(src, baseUrl).href; } catch (e) {}
        }
      });
    }
  }

  // Annotate rendered DOM elements with data-md-start / data-md-end
  // so getSelectedMarkdown() can map selections back to raw source.
  function _annotateSourceRanges(contentRoot, tokens, rawMd) {
    var blockIndex = 0;
    // Walk direct children of #content (each corresponds to a top-level token)
    var child = contentRoot.firstChild;
    while (child) {
      if (child.nodeType === 1 && blockIndex < tokens.length) {
        // HTML elements only
        var tok = tokens[blockIndex];
        if (tok._mdStart !== undefined && tok._mdEnd !== undefined) {
          child.setAttribute('data-md-start', tok._mdStart);
          child.setAttribute('data-md-end', tok._mdEnd);
          _sourceRanges.push({ el: child, start: tok._mdStart, end: tok._mdEnd });
        }
        blockIndex++;
      } else if (child.nodeType === 3) {
        // Whitespace text node from blank lines still consumes a position-aware token
        if (blockIndex < tokens.length && tokens[blockIndex].type === 'space') {
          blockIndex++;
        }
      }
      child = child.nextSibling;
    }
  }

  function escapeHtml(text) {
    return text.replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>');
  }

  // --- Search ---
  var searchMatches = [];
  var currentMatchIndex = -1;

  function searchText(query, direction, fromStart) {
    if (fromStart) currentMatchIndex = -1;

    // Strip existing highlights without resetting navigation state
    var content = document.getElementById('content');
    content.innerHTML = content.innerHTML.replace(/<mark class="search-highlight[^"]*"[^>]*>(.*?)<\/mark>/gi, '$1');

    if (!query) return false;

    var regex = new RegExp(escapeRegex(query), 'gi');
    var html = content.innerHTML;
    var matchCount = 0;
    html = html.replace(regex, function(match) {
      return '<mark class="search-highlight" data-search-idx="' + (matchCount++) + '">' + match + '</mark>';
    });
    content.innerHTML = html;
    searchMatches = Array.from(content.querySelectorAll('mark[data-search-idx]'));

    if (searchMatches.length === 0) {
      currentMatchIndex = -1;
      return true;
    }

    var wrapped = false;
    if (direction === 'prev') {
      if (currentMatchIndex <= 0) {
        wrapped = currentMatchIndex === 0;
        currentMatchIndex = searchMatches.length - 1;
      } else {
        currentMatchIndex--;
      }
    } else {
      if (currentMatchIndex >= searchMatches.length - 1) {
        wrapped = currentMatchIndex !== -1;
        currentMatchIndex = 0;
      } else {
        currentMatchIndex++;
      }
    }

    highlightCurrent();
    return wrapped;
  }

  function highlightCurrent() {
    searchMatches.forEach(function(el, i) {
      el.className = (i === currentMatchIndex) ? 'search-highlight-current' : 'search-highlight';
    });
    if (searchMatches[currentMatchIndex]) {
      searchMatches[currentMatchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function clearSearch() {
    var content = document.getElementById('content');
    content.innerHTML = content.innerHTML.replace(/<mark class="search-highlight[^"]*"[^>]*>(.*?)<\/mark>/gi, '$1');
    searchMatches = [];
    currentMatchIndex = -1;
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // --- Copy ---
  var rawMarkdown = '';

  function setRawMarkdown(md) {
    rawMarkdown = md;
  }

  function getRawMarkdown() {
    return rawMarkdown;
  }

  // Light-theme inline styles applied to copied content. Without this, copying
  // while the preview is in dark mode pastes white text on dark backgrounds in
  // Word, and bare <code>/<pre> tags lose their box styling entirely.
  var COPY_STYLES = {
    'pre':        "background:#f4f4f4;color:#1a1a1a;padding:12px 16px;border-radius:6px;font-family:Consolas,'Courier New',monospace;font-size:0.9em;white-space:pre-wrap;overflow-x:auto;",
    'code':       "background:#f4f4f4;color:#1a1a1a;padding:2px 6px;border-radius:4px;font-family:Consolas,'Courier New',monospace;font-size:0.9em;",
    'blockquote': "border-left:4px solid #4a9eff;margin-left:0;padding-left:16px;color:#555;",
    'table':      "border-collapse:collapse;",
    'th':         "border:1px solid #e0e0e0;padding:8px 12px;background:#f4f4f4;text-align:left;font-weight:600;",
    'td':         "border:1px solid #e0e0e0;padding:8px 12px;text-align:left;",
    'h1':         "border-bottom:2px solid #e0e0e0;padding-bottom:6px;",
    'h2':         "border-bottom:1px solid #e0e0e0;padding-bottom:4px;",
    'a':          "color:#1a73e8;",
    'hr':         "border:none;border-top:1px solid #e0e0e0;"
  };

  function applyCopyStyles(root) {
    var selector = Object.keys(COPY_STYLES).join(',');
    var nodes = root.querySelectorAll(selector);
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      var s = COPY_STYLES[el.tagName.toLowerCase()];
      if (s) el.setAttribute('style', s + (el.getAttribute('style') || ''));
    }
    // <pre><code> nested: the <pre> already provides the box; clear the inner <code>.
    var preCodes = root.querySelectorAll('pre code');
    for (var j = 0; j < preCodes.length; j++) {
      preCodes[j].setAttribute('style', "background:transparent;padding:0;font-family:Consolas,'Courier New',monospace;");
    }
  }

  // Builds a clean, light-theme HTML+text snapshot for the clipboard.
  // If a selection exists, returns the selection's content; otherwise the whole document.
  function buildCopyPayload() {
    var selection = window.getSelection();
    var hasSelection = !!(selection && !selection.isCollapsed && selection.toString().length > 0);
    var div = document.createElement('div');
    var text;
    if (hasSelection) {
      for (var i = 0; i < selection.rangeCount; i++) {
        div.appendChild(selection.getRangeAt(i).cloneContents());
      }
      text = selection.toString();
    } else {
      var content = document.getElementById('content');
      var clone = content.cloneNode(true);
      while (clone.firstChild) div.appendChild(clone.firstChild);
      text = content.innerText;
    }
    applyCopyStyles(div);
    return { html: div.innerHTML, text: text, hasSelection: hasSelection };
  }

  // Called from the C# host (menu / context-menu "Copy"). Returns JSON.
  function getCopyPayload() {
    return JSON.stringify(buildCopyPayload());
  }

  // Extracts the raw markdown text corresponding to the current DOM selection
  // by walking up from selected nodes to find data-md-start/data-md-end attributes.
  // Returns the raw markdown substring, or empty string if nothing is selected.
  function getSelectedMarkdown() {
    var selection = window.getSelection();
    if (!selection || selection.isCollapsed || !selection.rangeCount) {
      return '';
    }

    var range = selection.getRangeAt(0);
    if (!range || range.collapsed) return '';

    // Find the first and last elements with source-range annotations that
    // intersect the selection. We look for the closest annotated ancestor
    // of the start and end containers, then include all blocks in between.
    function findAnnotatedAncestor(node) {
      while (node) {
        if (node.nodeType === 1 && node.hasAttribute && node.hasAttribute('data-md-start')) {
          return node;
        }
        node = node.parentNode;
      }
      return null;
    }

    var startEl = findAnnotatedAncestor(range.startContainer);
    var endEl = findAnnotatedAncestor(range.endContainer);

    // If start or end container is text inside an annotated element, walk up.
    // Also cover the case where the selection starts/ends exactly at a boundary.
    if (!startEl || !endEl) return '';

    var start = parseInt(startEl.getAttribute('data-md-start'), 10);
    var end = parseInt(endEl.getAttribute('data-md-end'), 10);

    if (isNaN(start) || isNaN(end)) return '';

    // Also include any annotated siblings between startEl and endEl
    // that might be partially or fully selected.
    var contentRoot = document.getElementById('content');
    var allAnnotated = contentRoot.querySelectorAll('[data-md-start]');
    var minStart = start;
    var maxEnd = end;

    // Check which annotated elements intersect the selection range
    for (var i = 0; i < allAnnotated.length; i++) {
      var el = allAnnotated[i];
      // Skip if this element is not in our source-ranges
      var elStart = parseInt(el.getAttribute('data-md-start'), 10);
      var elEnd = parseInt(el.getAttribute('data-md-end'), 10);
      if (isNaN(elStart) || isNaN(elEnd)) continue;
      // Check if the element intersects the selection range
      if (range.intersectsNode(el)) {
        if (elStart < minStart) minStart = elStart;
        if (elEnd > maxEnd) maxEnd = elEnd;
      }
    }

    return rawMarkdown.substring(minStart, maxEnd);
  }

  // Ctrl+Shift+C inside the preview: extracts the selected raw markdown and
  // posts it back to the C# host. WebView2 doesn't bubble key events to WPF
  // KeyBindings, so this is the in-preview equivalent of the Window-level binding.
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && !e.altKey && (e.key === 'C' || e.key === 'c')) {
      e.preventDefault();
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage({ type: 'copy-as-markdown' });
      }
    }
  });

  // Override Ctrl+C / drag-copy so the clipboard gets the same clean, light-theme
  // HTML the menu produces, instead of the browser default's computed-style HTML
  // (which bakes in dark-mode colours and ends up white-on-dark in Word).
  // No-selection Ctrl+C falls through to buildCopyPayload's whole-document branch.
  document.addEventListener('copy', function(e) {
    var payload = buildCopyPayload();
    e.clipboardData.setData('text/html', payload.html);
    e.clipboardData.setData('text/plain', payload.text);
    e.preventDefault();
  });

  // Expose renderMarkdown globally (called from C# via ExecuteScriptAsync)
  // Save the internal render function before replacing the global name
  var _renderMarkdown = renderMarkdown;
  window.renderMarkdown = function(md, baseUrl) {
    setRawMarkdown(md);
    _renderMarkdown(md, baseUrl);
  };

  // Expose for C# to retrieve selected markdown
  window.getSelectedMarkdown = getSelectedMarkdown;

  // Expose for C# to check if there is a non-collapsed selection
  window.hasSelection = function() {
    var s = window.getSelection();
    return !!(s && !s.isCollapsed && s.toString().length > 0);
  };
</script>
</body>
</html>
